name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        if: secrets.EC2_HOST != ''
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /path/to/project
            git pull origin main
            cd server
            npm install
            pm2 restart shopsmart-server || pm2 start src/index.js --name shopsmart-server
            cd ../client
            npm install
            npm run build
            # assuming some static file serving setup for client
