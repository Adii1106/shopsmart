version: '3.8'

services:
  backend:
    build: ./server
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=development
    volumes:
      - ./server:/app
      - /app/node_modules

  frontend:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5001
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - backend
